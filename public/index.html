<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PolyWhale 🐋</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#080C14;color:#E8EDF5;font-family:'Inter',sans-serif;min-height:100vh}
    header{background:#111927;border-bottom:1px solid #1A2535;padding:0 16px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
    .logo{font-family:'Roboto Mono',monospace;font-weight:700;font-size:15px;letter-spacing:.06em;display:flex;align-items:center;gap:8px}
    .dot{width:8px;height:8px;border-radius:50%;background:#00C48C;box-shadow:0 0 6px #00C48C;animation:pulse 2s infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
    .scan-btn{background:#00C48C18;border:1px solid #00C48C44;border-radius:6px;color:#00C48C;font-family:'Roboto Mono',monospace;font-size:11px;font-weight:700;padding:7px 14px;cursor:pointer}
    .scan-btn:disabled{opacity:.4;cursor:not-allowed}
    .badge{font-family:'Roboto Mono',monospace;font-size:10px;font-weight:700;padding:3px 8px;border-radius:3px;background:#00C48C18;border:1px solid #00C48C44;color:#00C48C}
    main{max-width:680px;margin:0 auto;padding:16px 12px 60px}
    .config{background:#0D1420;border:1px solid #1A2535;border-radius:8px;padding:14px 16px;margin-bottom:16px;display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
    .config label{font-family:'Roboto Mono',monospace;font-size:9px;color:#5A6A82;letter-spacing:.1em;display:block;margin-bottom:4px}
    .config .val{font-family:'Roboto Mono',monospace;font-size:14px;font-weight:700;color:#00D4FF}
    .slabel{font-family:'Roboto Mono',monospace;font-size:10px;color:#5A6A82;letter-spacing:.12em;margin-bottom:8px}
    .empty{text-align:center;padding:60px 20px;color:#5A6A82}
    .empty .icon{font-size:40px;opacity:.2;margin-bottom:12px}
    .empty p{font-family:'Roboto Mono',monospace;font-size:11px;letter-spacing:.1em}
    .empty small{font-size:12px;margin-top:8px;display:block;line-height:1.6}
    .card{background:#0D1420;border:1px solid #1A2535;border-radius:8px;padding:14px;margin-bottom:10px;animation:fadeIn .3s ease}
    .card.sharp{border-color:#00C48C44;background:#00C48C08}
    .card.watch{border-color:#F5A62344;background:#F5A62308}
    @keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
    .card-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;flex-wrap:wrap;gap:6px}
    .grade{font-family:'Roboto Mono',monospace;font-size:10px;font-weight:700;padding:2px 7px;border-radius:3px}
    .grade.sharp{color:#00C48C;background:#00C48C18;border:1px solid #00C48C44}
    .grade.watch{color:#F5A623;background:#F5A62318;border:1px solid #F5A62344}
    .market{font-size:13px;font-weight:600;margin-bottom:10px;line-height:1.4}
    .stats{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:10px}
    .stat label{font-family:'Roboto Mono',monospace;font-size:9px;color:#5A6A82;letter-spacing:.1em;display:block;margin-bottom:2px}
    .stat .v{font-family:'Roboto Mono',monospace;font-size:12px;font-weight:700;color:#E8EDF5}
    .sent{color:#00C48C}.fail{color:#FF4757}
    .time{font-family:'Roboto Mono',monospace;font-size:10px;color:#5A6A82}
    .addr{font-family:'Roboto Mono',monospace;font-size:11px;color:#00D4FF;font-weight:600}
  </style>
</head>
<body>
<header>
  <div class="logo">
    <div class="dot"></div>
    POLYWHALE
    <span style="font-size:10px;color:#5A6A82;font-weight:400">SHARP TRACKER</span>
  </div>
  <div style="display:flex;gap:8px;align-items:center">
    <span class="badge" id="badge">READY</span>
    <button class="scan-btn" id="btn" onclick="scan()">▶ SCAN NOW</button>
  </div>
</header>

<main>
  <div class="config">
    <div><label>MIN SIZE</label><div class="val">$1,000</div></div>
    <div><label>MIN WIN RATE</label><div class="val">65%</div></div>
    <div><label>ALERTS</label><div class="val" style="font-size:11px">Discord 🐋</div></div>
  </div>
  <div class="slabel">ALERT FEED</div>
  <div id="feed">
    <div class="empty">
      <div class="icon">◎</div>
      <p>SCANNER READY</p>
      <small>
        Tap SCAN NOW to check markets now<br>
        Auto-scans every 5 min via Vercel cron<br>
        Discord alerts fire automatically 🔔
      </small>
    </div>
  </div>
</main>

<script>
const alerts = [];

async function scan() {
  const btn = document.getElementById("btn");
  const badge = document.getElementById("badge");
  btn.disabled = true;
  btn.textContent = "SCANNING…";
  badge.textContent = "SCANNING";
  badge.style.cssText = "font-family:'Roboto Mono',monospace;font-size:10px;font-weight:700;padding:3px 8px;border-radius:3px;background:#F5A62318;border:1px solid #F5A62344;color:#F5A623";

  try {
    const r = await fetch("/api/scan");
    const data = await r.json();
    if (data.alerts) data.alerts.forEach(a => alerts.unshift({...a, ts: new Date()}));
    render();
    const n = data.alertsFired || 0;
    badge.textContent = n > 0 ? `⚡ ${n} ALERT${n>1?"S":""}` : "SCANNED · 0";
    badge.style.cssText = `font-family:'Roboto Mono',monospace;font-size:10px;font-weight:700;padding:3px 8px;border-radius:3px;background:${n>0?"#00C48C18":"#1A2535"};border:1px solid ${n>0?"#00C48C44":"#1A2535"};color:${n>0?"#00C48C":"#5A6A82"}`;
  } catch(e) {
    badge.textContent = "ERROR";
    badge.style.color = "#FF4757";
  }

  setTimeout(() => {
    btn.disabled = false;
    btn.textContent = "▶ SCAN NOW";
    badge.textContent = "LIVE";
    badge.style.cssText = "font-family:'Roboto Mono',monospace;font-size:10px;font-weight:700;padding:3px 8px;border-radius:3px;background:#00C48C18;border:1px solid #00C48C44;color:#00C48C";
  }, 12000);
}

function render() {
  if (!alerts.length) return;
  document.getElementById("feed").innerHTML = alerts.slice(0,40).map(a => {
    const sharp = (a.grade||"").includes("SHARP");
    const ts = a.ts?.toLocaleTimeString([],{hour:"2-digit",minute:"2-digit",second:"2-digit"}) || "";
    return `<div class="card ${sharp?"sharp":"watch"}">
      <div class="card-top">
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
          <span class="addr">${a.wallet||"—"}</span>
          <span class="grade ${sharp?"sharp":"watch"}">${a.grade||"WATCH"}</span>
        </div>
        <span class="time">${ts}</span>
      </div>
      <div class="market">${a.market||"—"}</div>
      <div class="stats">
        <div class="stat"><label>WIN RATE</label><div class="v">${a.winRate||"—"}</div></div>
        <div class="stat"><label>SIZE</label><div class="v">${a.size||"—"}</div></div>
        <div class="stat"><label>DISCORD</label><div class="v ${a.sent?"sent":"fail"}">${a.sent?"✓ SENT":"✗ FAILED"}</div></div>
      </div>
    </div>`;
  }).join("");
}
</script>
</body>
</html>
